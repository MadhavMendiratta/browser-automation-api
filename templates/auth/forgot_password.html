<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — Scraper Console</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] } } }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }</style>
</head>
<body class="h-full bg-slate-50 antialiased">

<div class="min-h-full flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-md space-y-8">

        <!-- Logo -->
        <div class="text-center">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-indigo-600 shadow-lg shadow-indigo-600/30 mb-4">
                <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-slate-900 tracking-tight">Forgot your password?</h2>
            <p class="mt-1 text-sm text-slate-500">Enter your email and we'll send you a reset link</p>
        </div>

        <!-- Error message -->
        {% if error %}
        <div class="rounded-xl bg-red-50 border border-red-200/80 px-4 py-3">
            <p class="text-sm text-red-700 font-medium">{{ error }}</p>
        </div>
        {% endif %}

        <!-- Success message -->
        {% if success %}
        <div class="rounded-xl bg-green-50 border border-green-200/80 px-4 py-3">
            <p class="text-sm text-green-700 font-medium">{{ success }}</p>
        </div>
        {% endif %}

        <!-- Form -->
        <form method="POST" action="/forgot-password" class="space-y-5">
            <div>
                <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5">Email address</label>
                <input type="email" name="email" id="email" required autocomplete="email"
                       placeholder="you@example.com"
                       class="block w-full px-4 py-3 text-sm border border-slate-300 rounded-xl bg-white placeholder-slate-400
                              focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all duration-150">
            </div>

            <button type="submit"
                    class="w-full flex justify-center py-3 px-4 text-sm font-semibold rounded-xl text-white
                           bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500
                           shadow-lg shadow-indigo-600/25 transition-all duration-150">
                Send reset link
            </button>
        </form>

        <p class="text-center text-sm text-slate-500">
            Remember your password?
            <a href="/login" class="font-semibold text-indigo-600 hover:text-indigo-500 transition-colors">Sign in</a>
        </p>
    </div>
</div>

</body>
</html>
